project:
  name: "pothole_maskrcnn_mobilenetv4_conv_large_fpn"
  seed: 42
  device: "auto"
  work_dir: "runs/maskrcnn_mobilenetv4_conv_large_fpn"
  test_eval_dir: "runs/maskrcnn_mobilenetv4_conv_large_fpn/test_eval"

data:
  source: "roboflow"
  workspace: "informatika-rpibl"
  project: "jalan-berlubang-fixed-oz5ts"
  version: 3
  format: "coco-segmentation"

  class_name: "Lubang"
  metric_prefix: "pothole"
  coco_category_id: 0
  background_label: 0
  object_label: 1
  num_classes: 2

  train_split: "train"
  val_split: "valid"
  test_split: "test"

  fix_categories: true
  filter_empty_gt: true
  min_size: 32

model:
  architecture: "maskrcnn"
  framework: "torchvision"

  backbone:
    name: "mobilenetv4_conv_large_fpn"
    source: "timm"
    timm_model_name: "mobilenetv4_conv_large"
    pretrained: true
    out_channels: 256

  transform:
    no_resize_internal: true
    image_mean: [0.485, 0.456, 0.406]
    image_std: [0.229, 0.224, 0.225]
    size_divisible: 32

  roi_heads:
    score_thresh: 0.05
    detections_per_img: 100

augmentation:
  train:
    random_flip:
      enabled: true
      p: 0.5

    albumentations:
      random_brightness_contrast:
        enabled: true
        brightness_limit: 0.2
        contrast_limit: 0.2
        p: 0.7

      hue_saturation_value:
        enabled: true
        hue_shift_limit: 8
        sat_shift_limit: 15
        val_shift_limit: 10
        p: 0.4

      motion_blur:
        enabled: true
        blur_limit: 4
        p: 0.2

      sharpen:
        enabled: true
        alpha: [0.1, 0.25]
        lightness: [0.9, 1.1]
        p: 0.15

    random_choice_resize:
      enabled: true
      scales:
        - [1333, 800]
        - [1600, 900]
        - [1800, 1000]
      keep_ratio: true

  val:
    resize:
      scale: [1600, 900]
      keep_ratio: true

  test:
    resize:
      scale: [1600, 900]
      keep_ratio: true

train:
  epochs: 50
  batch_size: 4
  val_batch_size: 1
  test_batch_size: 1
  num_workers: 2
  pin_memory: true
  amp: true

  optimizer:
    name: "SGD"
    lr: 0.01
    momentum: 0.9
    weight_decay: 0.0001

  scheduler:
    name: "warmup_cosine"
    warmup_iters: 500
    warmup_start_factor: 0.001
    t_max: 50
    eta_min: 0.00001

  gradient_clipping:
    enabled: false
    max_norm: 5.0

  early_stopping:
    enabled: true
    monitor: "segm_mAP"
    mode: "max"
    patience: 15
    min_delta: 0.001

  checkpoint:
    save_best: true
    monitor: "segm_mAP"
    mode: "max"
    best_model_name: "best_segm_mAP.pth"
    last_model_name: "last_checkpoint.pth"
    save_last: true

evaluation:
  metrics:
    - "coco_bbox"
    - "coco_segm"
    - "pothole_metric"

  coco:
    score_thr: 0.05
    mask_thr: 0.5

  pothole_metric:
    prefix: "pothole"
    score_thr: 0.05
    mask_thr: 0.5
    merge_instances: true

predict:
  score_thr: 0.05
  mask_thr: 0.5
  mask_alpha: 0.45

export:
  onnx: true
  input_size: [1600, 900]